<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Kuyumcu Yönetim</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="/icon.svg"/>
  <meta name="theme-color" content="#0f1923"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Kuyumcu"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:#0f1923;font-family:Georgia,serif;color:#e2e8f0;overscroll-behavior:none;}
    select,input,button{font-family:Georgia,serif;}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#0f1923;}::-webkit-scrollbar-thumb{background:#2d4a6e;border-radius:2px;}
    @media print{.noprint{display:none !important;}body{background:white;}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/sw.js").catch(()=>{});});}
</script>
<script type="text/babel">
const {useState,useEffect}=React;

const KATEGORILER=[
  {id:"gumus_satis",label:"Gümüş Satış",ikon:"⚪",renk:"#94a3b8"},
  {id:"altin_satis",label:"Altın Satış",ikon:"🥇",renk:"#f0a500"},
  {id:"hurda_alim",label:"Hurda Alım",ikon:"♻️",renk:"#10b981"},
  {id:"tamir",label:"Tamir / İşçilik",ikon:"🔧",renk:"#60a5fa"},
];
const AYARLAR_ALTIN=[
  {label:"8 Ayar",oran:0.333},{label:"10 Ayar",oran:0.416},{label:"14 Ayar",oran:0.585},
  {label:"18 Ayar",oran:0.750},{label:"21 Ayar",oran:0.875},{label:"22 Ayar",oran:0.916},{label:"24 Ayar",oran:0.999}
];
const AYARLAR_GUMUS=[
  {label:"700",oran:0.700},{label:"800",oran:0.800},{label:"900",oran:0.900},{label:"925",oran:0.925},{label:"999",oran:0.999}
];
const DUKKAN_DEFAULT={ad:"ALTIN DÜNYASI KUYUMCULUK",adres:"Kapalıçarşı No:42, İstanbul",telefon:"0212 555 44 33"};

const fmt$=(n)=>"$"+(parseFloat(n)||0).toFixed(2);
const fmtTL=(n)=>"₺"+(parseFloat(n)||0).toFixed(2);
const tarih=()=>new Date().toLocaleString("tr-TR");
let _no=2000; const yeniNo=()=>`F${++_no}`;

const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const S={
  inp:{width:"100%",boxSizing:"border-box",background:"#1e2d3d",border:"1px solid #2d4a6e",borderRadius:8,padding:"11px 14px",color:"#e2e8f0",fontFamily:"Georgia,serif",fontSize:15,outline:"none",WebkitAppearance:"none"},
  btn:(bg,c)=>({background:bg||"linear-gradient(135deg,#3b82f6,#2563eb)",border:"none",borderRadius:8,padding:"13px 0",color:c||"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}),
  card:{background:"#16222e",borderRadius:12,border:"1px solid #1e3a52",padding:14,marginBottom:10},
  lbl:{color:"#64748b",fontSize:11,letterSpacing:1,marginBottom:4,display:"block"},
};

function Logo({size=32}){
  return(
    <svg width={size} height={size} viewBox="0 0 512 512">
      <rect width="512" height="512" rx="100" fill="#0f1923"/>
      <ellipse cx="256" cy="340" rx="110" ry="38" fill="none" stroke="#c8a84b" strokeWidth="22"/>
      <path d="M146 340 Q146 420 256 420 Q366 420 366 340" fill="none" stroke="#c8a84b" strokeWidth="22" strokeLinecap="round"/>
      <polygon points="256,100 310,185 256,210 202,185" fill="#1e2d3d" stroke="#c8a84b" strokeWidth="14" strokeLinejoin="round"/>
      <polygon points="256,118 298,178 256,196 214,178" fill="#60a5fa"/>
      <polygon points="256,118 298,178 256,160" fill="#93c5fd" opacity="0.7"/>
      <polygon points="256,118 214,178 256,160" fill="#3b82f6" opacity="0.8"/>
      <polygon points="256,160 214,178 298,178" fill="#1d4ed8" opacity="0.6"/>
      <polygon points="266,128 285,155 272,150" fill="#fff" opacity="0.4"/>
      <path d="M202,185 Q180,260 146,340" fill="none" stroke="#c8a84b" strokeWidth="22" strokeLinecap="round"/>
      <path d="M310,185 Q332,260 366,340" fill="none" stroke="#c8a84b" strokeWidth="22" strokeLinecap="round"/>
    </svg>
  );
}

function Nav({aktif,setAktif}){
  const items=[{id:"fis",ikon:"🧾",lbl:"Fiş Kes"},{id:"gecmis",ikon:"📋",lbl:"Geçmiş"},{id:"hurda",ikon:"♻️",lbl:"Hurda"},{id:"cari",ikon:"👥",lbl:"Cariler"},{id:"ayarlar",ikon:"⚙️",lbl:"Ayarlar"}];
  return(
    <div style={{display:"flex",background:"#0a1520",borderTop:"1px solid #1e3a52",flexShrink:0}}>
      {items.map(it=>(
        <button key={it.id} onClick={()=>setAktif(it.id)} style={{flex:1,background:"none",border:"none",padding:"8px 0 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
          <span style={{fontSize:19}}>{it.ikon}</span>
          <span style={{fontSize:9,color:aktif===it.id?"#3b82f6":"#475569",fontFamily:"Georgia,serif"}}>{it.lbl}</span>
          {aktif===it.id&&<div style={{width:18,height:2,background:"#3b82f6",borderRadius:1}}/>}
        </button>
      ))}
    </div>
  );
}

// ─── HAS HESABI ──────────────────────────────────────────────────────────────
function hasHesapla(gram, ayar, ayarlar){
  const obj=ayarlar.find(a=>a.label===ayar);
  if(!obj||!gram)return null;
  return ((parseFloat(gram)||0)*obj.oran).toFixed(3);
}

// ─── FİŞ HTML ────────────────────────────────────────────────────────────────
function buildFisHtml(fis){
  const kat=KATEGORILER.find(k=>k.id===fis.kategori)?.label||"";
  const rows=fis.kalemler.map(k=>{
    const gAyar=AYARLAR_GUMUS.find(a=>a.label===k.ayar);
    const aAyar=AYARLAR_ALTIN.find(a=>a.label===k.ayar);
    if(k.tip==="gumus_iscilik"){
      const isc=(parseFloat(k.gram)||0)*(parseFloat(k.iscilikFiyat)||0);
      const has=gAyar&&k.gram?` → ${((parseFloat(k.gram)||0)*gAyar.oran).toFixed(3)}gr has`:"";
      return `<div style="font-weight:700;margin-top:6px">${k.aciklama||"Gümüş"}</div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#555"><span>Gümüş${k.ayar?" ("+k.ayar+")":""}${has}</span><span>${k.gram}gr</span></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#555"><span>İşçilik ${k.gram}gr×$${k.iscilikFiyat}</span><span style="font-weight:700">${fmt$(isc)}</span></div>`;
    }
    if(k.tip==="adetli"){
      const para=k.para==="TL"?fmtTL:fmt$;
      return `<div style="font-weight:700;margin-top:6px">${k.aciklama||"Ürün"}</div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#555"><span>${k.adet} adet × ${para(k.adetFiyat)}</span><span style="font-weight:700">${para(k.tutar)}</span></div>`;
    }
    const para=k.para==="TL"?fmtTL:fmt$;
    const isc=k.iscilikMod==="gramBazli"&&k.iscilikFiyat?` + İşç:${para((parseFloat(k.gram)||0)*(parseFloat(k.iscilikFiyat)||0))}`:k.iscilikMod==="sabit"&&k.sabitIscilik?` + İşç:${para(k.sabitIscilik)}`:"";
    const has=aAyar&&k.gram?` → ${((parseFloat(k.gram)||0)*aAyar.oran).toFixed(3)}gr has`:"";
    return `<div style="font-weight:700;margin-top:6px">${k.aciklama||"Ürün"}</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#555"><span>${k.gram}gr × ${para(k.birimFiyat)}/gr${k.ayar?" ("+k.ayar+")":""}${has}${isc}</span><span style="font-weight:700">${para(k.tutar)}</span></div>`;
  }).join("");

  const bakiyeSatiri=fis.musteriAd&&fis.odemeAlindi===true&&fis.yeniBakiye!==undefined
    ?`<div style="border-top:1px dashed #999;margin:8px 0;padding-top:8px;display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span>Bakiye</span><span>${fmt$(fis.yeniBakiye)}</span></div>`:"";

  const toplamStr=fis.kategori==="gumus_satis"
    ?`${fis.toplamGram?fis.toplamGram+"gr ":""}${fmt$(fis.toplam)}`
    :(fis.para==="TL"?fmtTL(fis.toplam):fmt$(fis.toplam));

  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Fiş ${fis.no}</title>
  <style>body{font-family:'Courier New',monospace;font-size:13px;width:280px;padding:12px;margin:0;}@media print{.np{display:none;}}</style>
  </head><body>
  <div style="text-align:center;font-weight:700;font-size:14px">${fis.dukkan.ad}</div>
  <div style="text-align:center;font-size:11px;color:#666">${fis.dukkan.adres}</div>
  <div style="text-align:center;font-size:11px;color:#666">Tel: ${fis.dukkan.telefon}</div>
  <div style="border-top:1px dashed #999;margin:8px 0"></div>
  <div style="display:flex;justify-content:space-between"><span>Fiş: <b>${fis.no}</b></span><span style="font-size:11px;color:#888">${fis.tarih}</span></div>
  <div style="font-size:11px;color:#666">İşlem: ${kat}</div>
  ${fis.musteriAd?`<div style="font-size:13px;font-weight:700;margin-top:2px">Müşteri: ${fis.musteriAd}</div>`:""}
  ${fis.odemeAlindi===true?`<div style="font-size:11px;color:green;font-weight:700">✅ Ödeme Alındı</div>`:""}
  <div style="border-top:1px dashed #999;margin:8px 0"></div>
  ${rows}
  <div style="border-top:1px dashed #999;margin:8px 0"></div>
  ${fis.toplamGram?`<div style="display:flex;justify-content:space-between;font-size:11px;color:#555"><span>Toplam Gümüş</span><span>${fis.toplamGram}gr</span></div>`:""}
  ${fis.toplamIscilik?`<div style="display:flex;justify-content:space-between;font-size:11px;color:#555"><span>Toplam İşçilik</span><span>${fmt$(fis.toplamIscilik)}</span></div>`:""}
  ${!fis.musteriAd?`<div style="display:flex;justify-content:space-between;font-weight:700;font-size:15px"><span>Satış</span><span>${toplamStr}</span></div>`:""}
  ${bakiyeSatiri}
  <div style="border-top:1px dashed #999;margin:8px 0"></div>
  <div style="text-align:center;font-size:11px;color:#888">— Teşekkür ederiz 🙏 —</div>
  <div class="np" style="margin-top:16px">
    <button onclick="window.print()" style="width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin-bottom:8px">🖨️ Yazdır / PDF</button>
  </div></body></html>`;
}

// ─── FİŞ GÖRÜNTÜLE ───────────────────────────────────────────────────────────
function FisGoruntule({fis,onKapat,onDuzenle}){
  const kat=KATEGORILER.find(k=>k.id===fis.kategori)?.label||"";
  const yazdir=()=>{const w=window.open("","_blank");w.document.write(buildFisHtml(fis));w.document.close();setTimeout(()=>w.print(),400);};
  const indir=()=>{const b=new Blob([buildFisHtml(fis)],{type:"text/html"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`Fis_${fis.no}.html`;a.click();URL.revokeObjectURL(u);};

  const paylas=async()=>{
    const html=buildFisHtml(fis);
    // Metin olarak paylaş (WhatsApp uyumlu)
    const metin=fisMetniBuild(fis);
    if(navigator.share){
      try{
        await navigator.share({title:`Fiş ${fis.no}`,text:metin});
        return;
      }catch(e){}
    }
    // Fallback: kopyala
    try{await navigator.clipboard.writeText(metin);alert("Fiş metni kopyalandı! WhatsApp'a yapıştırabilirsiniz.");}
    catch(e){indir();}
  };

  const fisMetniBuild=(f)=>{
    const kat=KATEGORILER.find(k=>k.id===f.kategori)?.label||"";
    let metin=`━━━━━━━━━━━━━━━━━━\n${f.dukkan.ad}\n${f.dukkan.adres}\nTel: ${f.dukkan.telefon}\n━━━━━━━━━━━━━━━━━━\n`;
    metin+=`Fiş: ${f.no} | ${f.tarih}\nİşlem: ${kat}\n`;
    if(f.musteriAd)metin+=`Müşteri: ${f.musteriAd}\n`;
    if(f.odemeAlindi===true)metin+=`✅ Ödeme Alındı\n`;
    metin+=`──────────────────\n`;
    f.kalemler.forEach(k=>{
      const para=k.para==="TL"?fmtTL:fmt$;
      metin+=`${k.aciklama||"Ürün"}\n`;
      if(k.tip==="gumus_iscilik"){
        const has=hasHesapla(k.gram,k.ayar,AYARLAR_GUMUS);
        metin+=`  Gümüş${k.ayar?" ("+k.ayar+")":""}${has?" → "+has+"gr has":""}: ${k.gram}gr\n`;
        metin+=`  İşçilik: ${k.gram}gr × $${k.iscilikFiyat} = ${fmt$((parseFloat(k.gram)||0)*(parseFloat(k.iscilikFiyat)||0))}\n`;
      } else if(k.tip==="adetli"){
        metin+=`  ${k.adet} adet × ${para(k.adetFiyat)} = ${para(k.tutar)}\n`;
      } else {
        const has=hasHesapla(k.gram,k.ayar,AYARLAR_ALTIN);
        metin+=`  ${k.gram}gr × ${para(k.birimFiyat)}/gr${k.ayar?" ("+k.ayar+")":""}${has?" → "+has+"gr has":""} = ${para(k.tutar)}\n`;
      }
    });
    metin+=`──────────────────\n`;
    if(f.toplamGram)metin+=`Toplam Gümüş: ${f.toplamGram}gr\n`;
    if(f.toplamIscilik)metin+=`Toplam İşçilik: ${fmt$(f.toplamIscilik)}\n`;
    if(!f.musteriAd)metin+=`SATIŞ: ${f.toplamGram?f.toplamGram+"gr ":""}${fmt$(f.toplam)}\n`;
    if(f.musteriAd&&f.odemeAlindi===true&&f.yeniBakiye!==undefined)metin+=`Bakiye: ${fmt$(f.yeniBakiye)}\n`;
    metin+=`━━━━━━━━━━━━━━━━━━\n— Teşekkür ederiz 🙏 —`;
    return metin;
  };

  const para=(k)=>k.para==="TL"?fmtTL:fmt$;

  return(
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <div style={{background:"#fff",color:"#111",borderRadius:8,padding:18,fontFamily:"'Courier New',monospace",fontSize:13,maxWidth:300,margin:"0 auto",boxShadow:"0 4px 24px #0008"}}>
        <div style={{textAlign:"center",marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:14}}>{fis.dukkan.ad}</div>
          <div style={{fontSize:11,color:"#666"}}>{fis.dukkan.adres}</div>
          <div style={{fontSize:11,color:"#666"}}>Tel: {fis.dukkan.telefon}</div>
        </div>
        <div style={{borderTop:"1px dashed #aaa",margin:"8px 0"}}/>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
          <span>Fiş: <strong>{fis.no}</strong></span>
          <span style={{fontSize:11,color:"#888"}}>{fis.tarih}</span>
        </div>
        <div style={{fontSize:11,color:"#666"}}>İşlem: {kat}</div>
        {fis.musteriAd&&<div style={{fontSize:14,fontWeight:700,color:"#111",marginTop:4}}>Müşteri: {fis.musteriAd}</div>}
        {fis.odemeAlindi===true&&<div style={{fontSize:11,fontWeight:700,color:"#059669",marginTop:2}}>✅ Ödeme Alındı</div>}
        <div style={{borderTop:"1px dashed #aaa",margin:"8px 0"}}/>
        {fis.kalemler.map((k,i)=>{
          const pFmt=k.para==="TL"?fmtTL:fmt$;
          const gAyar=AYARLAR_GUMUS.find(a=>a.label===k.ayar);
          const aAyar=AYARLAR_ALTIN.find(a=>a.label===k.ayar);
          return(
            <div key={i} style={{marginBottom:8}}>
              <div style={{fontWeight:700}}>{k.aciklama||"Ürün"}</div>
              {k.tip==="gumus_iscilik"&&(
                <>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555"}}>
                    <span>Gümüş{k.ayar?` (${k.ayar})`:""}{gAyar&&k.gram?<span style={{color:"#888"}}> → {((parseFloat(k.gram)||0)*gAyar.oran).toFixed(3)}gr has</span>:""}</span>
                    <span>{k.gram}gr</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555"}}>
                    <span>İşçilik {k.gram}gr×${k.iscilikFiyat}</span>
                    <strong>{fmt$((parseFloat(k.gram)||0)*(parseFloat(k.iscilikFiyat)||0))}</strong>
                  </div>
                </>
              )}
              {k.tip==="adetli"&&(
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555"}}>
                  <span>{k.adet} adet × {pFmt(k.adetFiyat)}</span><strong>{pFmt(k.tutar)}</strong>
                </div>
              )}
              {k.tip==="gramli"&&(
                <>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555"}}>
                    <span>{k.gram}gr×{pFmt(k.birimFiyat)}/gr{k.ayar?` (${k.ayar})`:""}{aAyar&&k.gram?<span style={{color:"#888"}}> → {((parseFloat(k.gram)||0)*aAyar.oran).toFixed(3)}gr has</span>:""}</span>
                    <strong>{pFmt(k.tutar)}</strong>
                  </div>
                  {k.iscilikMod==="gramBazli"&&k.iscilikFiyat&&<div style={{fontSize:11,color:"#888"}}>İşçilik: {k.gram}gr × {pFmt(k.iscilikFiyat)}</div>}
                  {k.iscilikMod==="sabit"&&k.sabitIscilik&&<div style={{fontSize:11,color:"#888"}}>İşçilik: {pFmt(k.sabitIscilik)}</div>}
                </>
              )}
            </div>
          );
        })}
        <div style={{borderTop:"1px dashed #aaa",marginTop:4,paddingTop:8}}>
          {fis.toplamGram>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}><span>Toplam Gümüş</span><span style={{fontWeight:700}}>{fis.toplamGram}gr</span></div>}
          {fis.toplamIscilik>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}><span>Toplam İşçilik</span><span style={{fontWeight:700}}>{fmt$(fis.toplamIscilik)}</span></div>}
          {!fis.musteriAd&&(
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:15,marginTop:4}}>
              <span>Satış</span><span>{fis.toplamGram>0?`${fis.toplamGram}gr `:""}{fis.para==="TL"?fmtTL(fis.toplam):fmt$(fis.toplam)}</span>
            </div>
          )}
        </div>
        {fis.musteriAd&&fis.odemeAlindi===true&&fis.yeniBakiye!==undefined&&(
          <div style={{borderTop:"1px dashed #aaa",marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:13}}>
            <span>Bakiye</span><span>{fmt$(fis.yeniBakiye)}</span>
          </div>
        )}
        <div style={{textAlign:"center",marginTop:10,fontSize:11,color:"#888"}}>— Teşekkür ederiz 🙏 —</div>
      </div>
      <div style={{maxWidth:300,margin:"14px auto 0",display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={yazdir} style={S.btn("linear-gradient(135deg,#3b82f6,#2563eb)")} className="noprint">🖨️ Yazdır / PDF</button>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button onClick={indir} style={{...S.btn("#1e2d3d","#60a5fa"),border:"1px solid #2d4a6e",fontSize:14}} className="noprint">⬇️ İndir</button>
          <button onClick={paylas} style={{...S.btn("#1e2d3d","#10b981"),border:"1px solid #2d4a6e",fontSize:14}} className="noprint">📤 Paylaş</button>
        </div>
        {onDuzenle&&<button onClick={onDuzenle} style={{...S.btn("#1e2d3d","#f0a500"),border:"1px solid #f0a50044",fontSize:14}} className="noprint">✏️ Düzenle</button>}
        <button onClick={onKapat} style={{...S.btn("#16222e","#64748b"),border:"1px solid #1e3a52",fontSize:14}} className="noprint">← Geri</button>
      </div>
    </div>
  );
}

// ─── GÜMÜŞ KALEMİ ────────────────────────────────────────────────────────────
function GumusKalem({kalem,idx,onChange,onSil}){
  const ayarObj=AYARLAR_GUMUS.find(a=>a.label===kalem.ayar);
  const gr=parseFloat(kalem.gram)||0;
  const isc=parseFloat(kalem.iscilikFiyat)||0;

    const pF=k.para==="TL"?fmtTL:fmt$;
    if(isT)return parseFloat(k.sabitIscilik)||0;

// ─── FİŞ KES ─────────────────────────────────────────────────────────────────
function FisEkrani({cariler,setCariler,dukkan,onFisKesild,duzFis,onTemizle}){
  const [kat,setKat]=useState(duzFis?.kategori||"gumus_satis");
  const [kalemler,setKalemler]=useState(duzFis?duzFis.kalemler:[]);
  const [musteriId,setMusteriId]=useState(duzFis?.musteriId||"");
  const [odeme,setOdeme]=useState(duzFis?.odemeAlindi??null);
  const [fisGoster,setFisGoster]=useState(null);
  const duz=!!duzFis;

  const bosGumus=()=>({id:Date.now()+Math.random(),tip:"gumus_iscilik",aciklama:"",ayar:"925",gram:"",iscilikFiyat:"",adet:"",adetFiyat:"",para:"USD",tutar:0});
  const bosAltin=()=>({id:Date.now()+Math.random(),tip:"gramli",aciklama:"",ayar:"",gram:"",birimFiyat:"",iscilikMod:"sabit",iscilikFiyat:"",sabitIscilik:"",adet:"",adetFiyat:"",para:"USD",tutar:0});
  const katDegistir=(k)=>{if(duz)return;setKat(k);setKalemler([]);setOdeme(null);};
  const ekle=()=>setKalemler(p=>[...p,kat==="gumus_satis"?bosGumus():bosAltin()]);
  const guncelle=(id,yeni)=>setKalemler(p=>p.map(k=>k.id===id?{...yeni,id}:k));
  const sil=(id)=>setKalemler(p=>p.filter(k=>k.id!==id));

  const toplamGram=kat==="gumus_satis"?kalemler.filter(k=>k.tip==="gumus_iscilik").reduce((a,k)=>a+(parseFloat(k.gram)||0),0):0;
  const toplamIscilik=kat==="gumus_satis"?kalemler.reduce((a,k)=>a+(k.tutar||0),0):0;
  const toplam=kat==="gumus_satis"?toplamIscilik:kalemler.reduce((a,k)=>a+(k.tutar||0),0);
  const musteri=cariler.find(c=>String(c.id)===String(musteriId))||null;
  const katObj=KATEGORILER.find(k=>k.id===kat);

  const kes=()=>{
    if(!kalemler.length||(musteriId&&odeme===null))return;
    const oncekiBakiye=musteri?(musteri.bakiye||0):undefined;
    const yeniBakiye=musteri?(odeme?oncekiBakiye:oncekiBakiye-toplam):undefined;

    if(duz&&duzFis.musteriId){
      setCariler(prev=>prev.map(c=>{
        if(String(c.id)!==String(duzFis.musteriId))return c;
        const geri=duzFis.odemeAlindi?0:duzFis.toplam;
        const gramGeri=(!duzFis.odemeAlindi&&duzFis.kategori==="gumus_satis")?(duzFis.toplamGram||0):0;
        return{...c,bakiye:(c.bakiye||0)+geri,gramBakiye:(c.gramBakiye||0)+gramGeri,fisler:(c.fisler||[]).filter(f=>f.no!==duzFis.no),islemler:(c.islemler||[]).filter(i=>i.fisNo!==duzFis.no)};
      }));
    }

    const fis={no:duz?duzFis.no:yeniNo(),tarih:duz?duzFis.tarih:tarih(),kategori:kat,kalemler,toplam,toplamGram,toplamIscilik,musteriId:musteri?String(musteri.id):"",musteriAd:musteri?musteri.ad:"",odemeAlindi:musteri?odeme:null,dukkan:{ad:dukkan.ad,adres:dukkan.adres,telefon:dukkan.telefon},oncekiBakiye,yeniBakiye};

    if(musteri){
      const katLbl=KATEGORILER.find(k=>k.id===kat)?.label||"";
      if(!odeme){
        const islem={id:Date.now(),tip:"borc",tutar:toplam,gram:kat==="gumus_satis"?toplamGram:null,aciklama:`Fiş ${fis.no} — ${katLbl}${toplamGram?` (${toplamGram}gr + ${fmt$(toplamIscilik)} işçilik)`:""}`,tarih:fis.tarih,fisNo:fis.no};
        setCariler(prev=>prev.map(c=>{
          if(String(c.id)!==String(musteri.id))return c;
          const yGram=kat==="gumus_satis"?(c.gramBakiye||0)-toplamGram:(c.gramBakiye||0);
          return{...c,bakiye:(c.bakiye||0)-toplam,gramBakiye:yGram,islemler:[islem,...(c.islemler||[])],fisler:[fis,...(c.fisler||[])]};
        }));
      } else {
        const islem={id:Date.now(),tip:"odeme",tutar:toplam,aciklama:`Fiş ${fis.no} — Nakit`,tarih:fis.tarih,fisNo:fis.no};
        setCariler(prev=>prev.map(c=>{
          if(String(c.id)!==String(musteri.id))return c;
          return{...c,islemler:[islem,...(c.islemler||[])],fisler:[fis,...(c.fisler||[])]};
        }));
      }
    }
    onFisKesild(fis,duz);setFisGoster(fis);
  };

  if(fisGoster)return <FisGoruntule fis={fisGoster} onKapat={()=>{setFisGoster(null);setKalemler([]);setMusteriId("");setOdeme(null);if(onTemizle)onTemizle();}}/>;

  return(
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      {duz&&<div style={{background:"#2a1a0a",border:"1px solid #f0a50055",borderRadius:8,padding:"8px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#f0a500",fontSize:13}}>✏️ Düzenleniyor: <b>{duzFis.no}</b></span><button onClick={onTemizle} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif"}}>İptal</button></div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {KATEGORILER.map(k=>(
          <button key={k.id} onClick={()=>katDegistir(k.id)} style={{background:kat===k.id?k.renk+"22":"#16222e",border:`1px solid ${kat===k.id?k.renk:"#1e3a52"}`,borderRadius:10,padding:"11px 8px",cursor:duz&&kat!==k.id?"not-allowed":"pointer",opacity:duz&&kat!==k.id?0.4:1,color:kat===k.id?k.renk:"#475569",fontFamily:"Georgia,serif",fontSize:13,fontWeight:kat===k.id?700:400,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>{k.ikon} {k.label}</button>
        ))}
      </div>
      <div style={S.card}>
        <span style={S.lbl}>MÜŞTERİ (OPSİYONEL)</span>
        <select value={musteriId} onChange={e=>{setMusteriId(e.target.value);setOdeme(null);}} style={{...S.inp,color:musteriId?"#e2e8f0":"#64748b"}}>
          <option value="">— Misafir Müşteri —</option>
          {cariler.map(c=><option key={c.id} value={String(c.id)}>{c.ad} ({fmt$(c.bakiye||0)})</option>)}
        </select>
        {musteriId&&musteri&&(
          <div style={{marginTop:10}}>
            <div style={{padding:"6px 10px",background:"#0f1923",borderRadius:6,marginBottom:10}}>
              <span style={{fontSize:11,color:"#64748b"}}>Bakiye: </span>
              <span style={{fontWeight:700,color:(musteri.bakiye||0)<0?"#ef4444":(musteri.bakiye||0)>0?"#10b981":"#475569"}}>{fmt$(musteri.bakiye||0)}</span>
              {(musteri.gramBakiye||0)!==0&&<span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>| {Math.abs(musteri.gramBakiye||0).toFixed(2)}gr gümüş</span>}
            </div>
            <span style={S.lbl}>ÖDEME DURUMU</span>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <button onClick={()=>setOdeme(true)} style={{background:odeme===true?"#0a2a1a":"#1e2d3d",border:`1px solid ${odeme===true?"#10b981":"#2d4a6e"}`,borderRadius:8,padding:"10px 0",cursor:"pointer",color:odeme===true?"#10b981":"#475569",fontFamily:"Georgia,serif",fontSize:13,fontWeight:odeme===true?700:400}}>✅ Ödeme Alındı</button>

        <div style={{...S.card,borderColor:"#f0a50044",marginBottom:14}}>

              {toplamIscilik>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#64748b",fontSize:13}}>Toplam İşçilik</span><span style={{color:"#f0a500",fontWeight:700}}>{fmt$(toplamIscilik)}</span></div>}
            </>
          ):(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{color:"#64748b",fontSize:12}}>TOPLAM</div><div style={{color:"#475569",fontSize:11}}>{kalemler.length} kalem</div></div>
              <span style={{color:"#f0a500",fontSize:28,fontWeight:700}}>{fmt$(toplam)}</span>

      <button onClick={kes} disabled={!kalemler.length||(!!musteriId&&odeme===null)} style={{...S.btn(kalemler.length&&(!musteriId||odeme!==null)?"linear-gradient(135deg,#f0a500,#d97706)":"#16222e",kalemler.length&&(!musteriId||odeme!==null)?"#1a0800":"#475569"),fontSize:16}}>{duz?"✏️ Fişi Güncelle":"🧾 Fiş Kes"}</button>
    </div>
  );
}

// ─── GEÇMİŞ ──────────────────────────────────────────────────────────────────

  const [filtre,setFiltre]=useState("hepsi");
  const [secilen,setSecilen]=useState(null);
  const liste=filtre==="hepsi"?fisler:fisler.filter(f=>f.kategori===filtre);

  const sil=(no)=>{if(!window.confirm("Bu fişi silmek istediğinize emin misiniz?"))return;setFisler(p=>p.filter(f=>f.no!==no));setSecilen(null);};
  if(secilen)return(
    <div style={{flex:1,overflowY:"auto"}}>
      <div style={{padding:"10px 14px"}}><button onClick={()=>setSecilen(null)} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:14}}>← Geri</button></div>

      <div style={{padding:"0 14px 14px",maxWidth:300,margin:"0 auto"}}><button onClick={()=>sil(secilen.no)} style={{...S.btn("#2a0a0a","#ef4444"),border:"1px solid #ef444433",marginTop:8}}>🗑️ Fişi Sil</button></div>

    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {[["hepsi","Hepsi"],...KATEGORILER.map(k=>[k.id,k.ikon+" "+k.label])].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltre(v)} style={{background:filtre===v?"#1e3a52":"#16222e",border:`1px solid ${filtre===v?"#3b82f6":"#1e3a52"}`,borderRadius:20,padding:"6px 12px",cursor:"pointer",color:filtre===v?"#60a5fa":"#475569",fontFamily:"Georgia,serif",fontSize:12,whiteSpace:"nowrap",fontWeight:filtre===v?700:400}}>{l}</button>
        ))}
      </div>
      <div style={{...S.card,borderColor:"#f0a50033",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between"}}><div style={{color:"#64748b",fontSize:11}}>TOPLAM ({liste.length} fiş)</div><span style={{color:"#f0a500",fontSize:22,fontWeight:700}}>{fmt$(toplam)}</span></div>
      </div>
      {!liste.length&&<div style={{textAlign:"center",color:"#334155",padding:40}}>Henüz fiş yok</div>}
      {[...liste].reverse().map(f=>{
        const k=KATEGORILER.find(x=>x.id===f.kategori);
        return(
          <button key={f.no} onClick={()=>setSecilen(f)} style={{...S.card,width:"100%",textAlign:"left",cursor:"pointer",border:"1px solid #1e3a52",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span style={{fontSize:14}}>{k?.ikon}</span><span style={{color:"#93c5fd",fontWeight:600,fontSize:14}}>{f.no}</span>{f.musteriAd&&<span style={{color:"#60a5fa",fontSize:12,fontWeight:600}}>• {f.musteriAd}</span>}</div>
              <div style={{color:"#475569",fontSize:11}}>{f.tarih}</div>
              <div style={{display:"flex",gap:8,marginTop:2}}><span style={{color:k?.renk,fontSize:11}}>{k?.label}</span>{f.odemeAlindi===true&&<span style={{fontSize:11,color:"#10b981"}}>✅</span>}</div>
            </div>
            <div style={{textAlign:"right"}}>{f.toplamGram>0&&<div style={{color:"#94a3b8",fontSize:12}}>{f.toplamGram}gr</div>}<div style={{color:"#f0a500",fontWeight:700,fontSize:16}}>{fmt$(f.toplam)}</div></div>
          </button>
        );
      })}
    </div>
  );
}

// ─── HURDA ───────────────────────────────────────────────────────────────────
function HurdaEkrani({cariler,dukkan,onFisKesild}){
  const [tur,setTur]=useState("altin");const [gram,setGram]=useState("");const [ayar,setAyar]=useState("");
  const [birimFiyat,setBirimFiyat]=useState("");const [aciklama,setAciklama]=useState("");
  const [musteriId,setMusteriId]=useState("");const [fisGoster,setFisGoster]=useState(null);
  const ayarlar=tur==="altin"?AYARLAR_ALTIN:AYARLAR_GUMUS;
  const secilenAyar=ayarlar.find(a=>a.label===ayar);
  const tutar=(parseFloat(gram)||0)*(parseFloat(birimFiyat)||0);
  const kes=()=>{
    if(!gram||!birimFiyat)return;
    const musteri=cariler.find(c=>String(c.id)===String(musteriId))||null;
    const has=secilenAyar&&gram?` (${((parseFloat(gram)||0)*secilenAyar.oran).toFixed(3)}gr has)`:"";
    const fis={no:yeniNo(),tarih:tarih(),kategori:"hurda_alim",kalemler:[{id:1,tip:"gramli",aciklama:aciklama||(ayar?ayar+" ":"")+"Hurda "+(tur==="altin"?"altın":"gümüş"),gram,birimFiyat,ayar,tutar,iscilikMod:"sabit",para:"USD"}],toplam:tutar,toplamGram:0,toplamIscilik:0,musteriId:musteri?String(musteri.id):"",musteriAd:musteri?musteri.ad:"",odemeAlindi:null,dukkan:{ad:dukkan.ad,adres:dukkan.adres,telefon:dukkan.telefon}};
    onFisKesild(fis,false);setFisGoster(fis);
  };
  if(fisGoster)return <FisGoruntule fis={fisGoster} onKapat={()=>{setFisGoster(null);setGram("");setBirimFiyat("");setAciklama("");setAyar("");}}/>;
  return(
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <div style={{...S.card,borderColor:"#10b98144"}}>
        <div style={{color:"#10b981",fontWeight:700,fontSize:15,marginBottom:14}}>♻️ HURDA ALIM</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {[["altin","🥇 Altın"],["gumus","⚪ Gümüş"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setTur(v);setAyar("");}} style={{background:tur===v?"#10b98122":"#1e2d3d",border:`1px solid ${tur===v?"#10b981":"#2d4a6e"}`,borderRadius:8,padding:"11px 0",cursor:"pointer",color:tur===v?"#10b981":"#475569",fontFamily:"Georgia,serif",fontSize:14,fontWeight:tur===v?700:400}}>{l}</button>
          ))}
        </div>
        <span style={S.lbl}>MÜŞTERİ (OPSİYONEL)</span>
        <select value={musteriId} onChange={e=>setMusteriId(e.target.value)} style={{...S.inp,marginBottom:12,color:musteriId?"#e2e8f0":"#64748b"}}>
          <option value="">— Misafir —</option>
          {cariler.map(c=><option key={c.id} value={String(c.id)}>{c.ad}</option>)}
        </select>
        <span style={S.lbl}>AÇIKLAMA (OPSİYONEL)</span>
        <input value={aciklama} onChange={e=>setAciklama(e.target.value)} placeholder="Örn: Altın yüzük..." style={{...S.inp,marginBottom:12}}/>
        <span style={S.lbl}>AYAR (OPSİYONEL)</span>
        <select value={ayar} onChange={e=>setAyar(e.target.value)} style={{...S.inp,marginBottom:6,color:ayar?"#e2e8f0":"#64748b"}}>
          <option value="">— Ayar seçin —</option>
          {ayarlar.map(a=><option key={a.label} value={a.label}>{a.label}</option>)}
        </select>
        {ayar&&gram&&secilenAyar&&<div style={{fontSize:11,color:"#60a5fa",marginBottom:8,padding:"3px 8px",background:"#1e2d3d",borderRadius:4,display:"inline-block"}}>{gram}gr × {Math.round(secilenAyar.oran*1000)} = {((parseFloat(gram)||0)*secilenAyar.oran).toFixed(3)}gr has</div>}
        <div style={{marginBottom:12}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <div><span style={S.lbl}>GRAM</span><input value={gram} onChange={e=>setGram(e.target.value)} type="number" inputMode="decimal" placeholder="0.000" style={S.inp}/></div>
          <div><span style={S.lbl}>ALIŞ FİYATI ($/gr)</span><input value={birimFiyat} onChange={e=>setBirimFiyat(e.target.value)} type="number" inputMode="decimal" placeholder="0.00" style={S.inp}/></div>
        </div>
        {gram&&birimFiyat&&<div style={{padding:"12px 14px",background:"#0a1a12",borderRadius:8,border:"1px solid #10b98155",marginBottom:14}}><div style={{color:"#475569",fontSize:12}}>{gram}gr × {fmt$(birimFiyat)}/gr</div><div style={{color:"#10b981",fontSize:24,fontWeight:700,marginTop:2}}>{fmt$(tutar)}</div></div>}
        <button onClick={kes} disabled={!gram||!birimFiyat} style={S.btn(gram&&birimFiyat?"linear-gradient(135deg,#10b981,#059669)":"#16222e","#fff")}>🧾 Hurda Fişi Kes</button>
      </div>
    </div>
  );
}

// ─── CARİ ────────────────────────────────────────────────────────────────────
function CariEkrani({cariler,setCariler}){
  const [ekran,setEkran]=useState("liste");
  const [secId,setSecId]=useState(null);
  const [yAd,setYAd]=useState("");const [yTel,setYTel]=useState("");
  const [yBakTip,setYBakTip]=useState("sifir");const [yBak,setYBak]=useState("");
  const [yGramTip,setYGramTip]=useState("sifir");const [yGram,setYGram]=useState("");
  const [isTip,setIsTip]=useState("odeme");
  const [isTutar,setIsTutar]=useState("");const [isAcik,setIsAcik]=useState("");
  const [isPara,setIsPara]=useState("dolar");
  const [isDolar,setIsDolar]=useState("");const [isGram,setIsGram]=useState("");
  const [secFis,setSecFis]=useState(null);
  const sec=cariler.find(c=>String(c.id)===String(secId));

  // Cari özet
  const toplamBorc=cariler.filter(c=>(c.bakiye||0)<0).reduce((a,c)=>a+(c.bakiye||0),0);
  const toplamAlacak=cariler.filter(c=>(c.bakiye||0)>0).reduce((a,c)=>a+(c.bakiye||0),0);

  const ekle=()=>{
    if(!yAd.trim())return;
    let bak=0,gramBak=0;
    if(yBakTip==="borc")bak=-(parseFloat(yBak)||0);
    else if(yBakTip==="alacak")bak=(parseFloat(yBak)||0);
    if(yGramTip==="borc")gramBak=-(parseFloat(yGram)||0);
    else if(yGramTip==="alacak")gramBak=(parseFloat(yGram)||0);
    const islemler=[];
    if(bak!==0)islemler.push({id:Date.now(),tip:bak<0?"borc":"odeme",tutar:Math.abs(bak),aciklama:"Açılış bakiyesi ($)",tarih:tarih()});
    if(gramBak!==0)islemler.push({id:Date.now()+1,tip:gramBak<0?"borc":"odeme",tutar:0,gram:Math.abs(gramBak),aciklama:`Açılış gümüş bakiyesi (${Math.abs(gramBak)}gr)`,tarih:tarih()});
    setCariler(p=>[...p,{id:String(Date.now()+2),ad:yAd.trim(),telefon:yTel.trim(),bakiye:bak,gramBakiye:gramBak,islemler,fisler:[]}]);
    setYAd("");setYTel("");setYBak("");setYBakTip("sifir");setYGram("");setYGramTip("sifir");setEkran("liste");
  };

  const islemYap=()=>{
    if(!sec)return;
    if(isPara==="gumus"){
      if(!isGram)return;
      const d=parseFloat(isDolar)||0;
      const g=parseFloat(isGram)||0;
      const gDelta=isTip==="odeme"?g:-g;
      const dDelta=isTip==="odeme"?d:-d;
      const is={id:Date.now(),tip:isTip,tutar:d,gram:g,aciklama:`${isAcik||"Gümüş işlemi"} (${g}gr${d?` = ${fmt$(d)}`:""}）`,tarih:tarih()};
      setCariler(p=>p.map(c=>String(c.id)===String(secId)?{...c,bakiye:(c.bakiye||0)+dDelta,gramBakiye:(c.gramBakiye||0)+gDelta,islemler:[is,...(c.islemler||[])]}:c));
      setIsTutar("");setIsAcik("");setIsGram("");setIsDolar("");
    } else if(isPara==="TL"){
      const tutar=parseFloat(isTutar);if(!tutar)return;
      const is={id:Date.now(),tip:isTip,tutar:0,tutarTL:tutar,aciklama:`${isAcik||"TL işlemi"} (${fmtTL(tutar)})`,tarih:tarih(),para:"TL"};
      setCariler(p=>p.map(c=>String(c.id)===String(secId)?{...c,tlBakiye:(c.tlBakiye||0)+(isTip==="odeme"?tutar:-tutar),islemler:[is,...(c.islemler||[])]}:c));
      setIsTutar("");setIsAcik("");
    } else {
      const tutar=parseFloat(isTutar);if(!tutar)return;
      const delta=isTip==="odeme"?tutar:-tutar;
      const is={id:Date.now(),tip:isTip,tutar,aciklama:isAcik||(isTip==="odeme"?"Ödeme alındı":"Borç eklendi"),tarih:tarih()};
      setCariler(p=>p.map(c=>String(c.id)===String(secId)?{...c,bakiye:(c.bakiye||0)+delta,islemler:[is,...(c.islemler||[])]}:c));
      setIsTutar("");setIsAcik("");
    }
  };

  const sil=(id)=>{if(!window.confirm("Bu müşteriyi silmek istediğinize emin misiniz?"))return;setCariler(p=>p.filter(c=>String(c.id)!==String(id)));setEkran("liste");};

  if(secFis)return(
    <div style={{flex:1,overflowY:"auto"}}>
      <div style={{padding:"10px 14px"}}><button onClick={()=>setSecFis(null)} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:14}}>← Geri</button></div>
      <FisGoruntule fis={secFis} onKapat={()=>setSecFis(null)}/>
    </div>
  );

  if(ekran==="yeni")return(
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <button onClick={()=>setEkran("liste")} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:14,marginBottom:14}}>← Geri</button>
      <div style={S.card}>
        <div style={{color:"#60a5fa",fontWeight:700,marginBottom:12}}>Yeni Müşteri</div>
        <span style={S.lbl}>AD SOYAD</span>
        <input value={yAd} onChange={e=>setYAd(e.target.value)} placeholder="Müşteri adı..." style={{...S.inp,marginBottom:10}}/>
        <span style={S.lbl}>TELEFON</span>
        <input value={yTel} onChange={e=>setYTel(e.target.value)} placeholder="0XXX XXX XX XX" type="tel" style={{...S.inp,marginBottom:12}}/>
        <span style={S.lbl}>MEVCUT DOLAR BAKİYESİ</span>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
          {[["sifir","Sıfır"],["borc","Borçlu"],["alacak","Alacaklı"]].map(([v,l])=>(
            <button key={v} onClick={()=>setYBakTip(v)} style={{background:yBakTip===v?"#1e3a52":"#1e2d3d",border:`1px solid ${yBakTip===v?"#3b82f6":"#2d4a6e"}`,borderRadius:6,padding:"8px 4px",cursor:"pointer",color:yBakTip===v?"#60a5fa":"#475569",fontFamily:"Georgia,serif",fontSize:12,fontWeight:yBakTip===v?700:400}}>{l}</button>
          ))}
        </div>
        {yBakTip!=="sifir"&&<input value={yBak} onChange={e=>setYBak(e.target.value)} type="number" inputMode="decimal" placeholder="0.00 $" style={{...S.inp,marginBottom:12}}/>}
        <span style={S.lbl}>MEVCUT GÜMÜŞ BAKİYESİ (gr)</span>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
          {[["sifir","Sıfır"],["borc","Borçlu"],["alacak","Alacaklı"]].map(([v,l])=>(
            <button key={v} onClick={()=>setYGramTip(v)} style={{background:yGramTip===v?"#1e3a52":"#1e2d3d",border:`1px solid ${yGramTip===v?"#3b82f6":"#2d4a6e"}`,borderRadius:6,padding:"8px 4px",cursor:"pointer",color:yGramTip===v?"#60a5fa":"#475569",fontFamily:"Georgia,serif",fontSize:12,fontWeight:yGramTip===v?700:400}}>{l}</button>
          ))}
        </div>
        {yGramTip!=="sifir"&&<input value={yGram} onChange={e=>setYGram(e.target.value)} type="number" inputMode="decimal" placeholder="0.000 gr" style={{...S.inp,marginBottom:12}}/>}
        <button onClick={ekle} style={S.btn()}>Kaydet</button>
      </div>
    </div>
  );

  if(ekran==="detay"&&sec)return(
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={()=>setEkran("liste")} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:14}}>← Geri</button>
        <button onClick={()=>sil(sec.id)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13}}>Sil</button>
      </div>
      <div style={S.card}>
        <div style={{color:"#60a5fa",fontWeight:700,fontSize:16}}>{sec.ad}</div>
        {sec.telefon&&<div style={{color:"#475569",fontSize:13,marginTop:2}}>{sec.telefon}</div>}
        <div style={{marginTop:12,padding:"12px 14px",background:"#0f1923",borderRadius:8}}>
          <div style={{color:"#475569",fontSize:11,letterSpacing:1,marginBottom:6}}>BAKİYE</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{color:"#64748b",fontSize:12}}>💵 Dolar</span>
            <span style={{fontWeight:700,fontSize:17,color:(sec.bakiye||0)<0?"#ef4444":(sec.bakiye||0)>0?"#10b981":"#475569"}}>{fmt$(sec.bakiye||0)}</span>
          </div>
          {(sec.gramBakiye||0)!==0&&(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{color:"#64748b",fontSize:12}}>⚪ Gümüş</span>
              <span style={{fontWeight:700,fontSize:17,color:(sec.gramBakiye||0)<0?"#ef4444":"#94a3b8"}}>{Math.abs(sec.gramBakiye||0).toFixed(3)}gr {(sec.gramBakiye||0)<0?"borç":"alacak"}</span>
            </div>
          )}
          {(sec.tlBakiye||0)!==0&&(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
