<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Kuyumcu Yönetim</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#0f1923; font-family:Georgia,serif; color:#e2e8f0; overscroll-behavior:none; }
    select,input,button { font-family:Georgia,serif; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:#0f1923; }
    ::-webkit-scrollbar-thumb { background:#2d4a6e; border-radius:2px; }
    @media print { .noprint { display:none !important; } body { background:white; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const KATEGORILER = [
  { id:"altin_satis", label:"Altın Satış", ikon:"🥇", renk:"#f0a500" },
  { id:"gumus_satis", label:"Gümüş Satış", ikon:"⚪", renk:"#94a3b8" },
  { id:"hurda_alim", label:"Hurda Alım", ikon:"♻️", renk:"#10b981" },
  { id:"tamir", label:"Tamir / İşçilik", ikon:"🔧", renk:"#60a5fa" },
];

const AYARLAR_ALTIN = [
  {label:"8 Ayar",oran:0.333},{label:"10 Ayar",oran:0.416},{label:"14 Ayar",oran:0.585},
  {label:"18 Ayar",oran:0.750},{label:"21 Ayar",oran:0.875},{label:"22 Ayar",oran:0.916},{label:"24 Ayar",oran:0.999},
];
const AYARLAR_GUMUS = [
  {label:"700",oran:0.700},{label:"800",oran:0.800},{label:"900",oran:0.900},{label:"925",oran:0.925},{label:"999",oran:0.999},
];

const DUKKAN_DEFAULT = { ad:"ALTIN DÜNYASI KUYUMCULUK", adres:"Kapalıçarşı No:42, İstanbul", telefon:"0212 555 44 33" };
const fmt$ = (n) => "$" + (parseFloat(n)||0).toFixed(2);
const tarihStr = () => new Date().toLocaleString("tr-TR");
let _fisNo = 2000;
const yeniFisNo = () => `F${++_fisNo}`;

const LS = {
  get: (k,def) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch { return def; } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
};

const S = {
  input: { width:"100%", boxSizing:"border-box", background:"#1e2d3d", border:"1px solid #2d4a6e", borderRadius:8, padding:"11px 14px", color:"#e2e8f0", fontFamily:"Georgia,serif", fontSize:15, outline:"none", WebkitAppearance:"none" },
  btn: (bg,color) => ({ background:bg||"linear-gradient(135deg,#3b82f6,#2563eb)", border:"none", borderRadius:8, padding:"13px 0", color:color||"#fff", fontFamily:"Georgia,serif", fontSize:15, fontWeight:700, cursor:"pointer", width:"100%", letterSpacing:0.5 }),
  card: { background:"#16222e", borderRadius:12, border:"1px solid #1e3a52", padding:14, marginBottom:10 },
  label: { color:"#64748b", fontSize:11, letterSpacing:1, marginBottom:4, display:"block" },
};

function BottomNav({ aktif, setAktif }) {
  const items = [{id:"fis",ikon:"🧾",label:"Fiş Kes"},{id:"gecmis",ikon:"📋",label:"Geçmiş"},{id:"hurda",ikon:"♻️",label:"Hurda"},{id:"cari",ikon:"👥",label:"Cariler"},{id:"ayarlar",ikon:"⚙️",label:"Ayarlar"}];
  return (
    <div style={{ display:"flex", background:"#0a1520", borderTop:"1px solid #1e3a52", flexShrink:0 }}>
      {items.map(it => (
        <button key={it.id} onClick={() => setAktif(it.id)} style={{ flex:1, background:"none", border:"none", padding:"8px 0 6px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:1 }}>
          <span style={{ fontSize:19 }}>{it.ikon}</span>
          <span style={{ fontSize:9, color:aktif===it.id?"#3b82f6":"#475569", fontFamily:"Georgia,serif" }}>{it.label}</span>
          {aktif===it.id && <div style={{ width:18, height:2, background:"#3b82f6", borderRadius:1 }} />}
        </button>
      ))}
    </div>
  );
}

function HasBilgi({ gram, ayarOran, tur }) {
  if (!gram||!ayarOran) return null;
  const has = (parseFloat(gram)*ayarOran).toFixed(3);
  return <div style={{ fontSize:11, color:"#60a5fa", marginTop:4, padding:"4px 8px", background:"#1e2d3d", borderRadius:4, display:"inline-block" }}>{gram}gr × {Math.round(ayarOran*1000)} = <b>{has} gr has {tur}</b></div>;
}

function SatirGiris({ satir, index, kategori, onChange, onSil }) {
  const isHurda = kategori==="hurda_alim";
  const isTamir = kategori==="tamir";
  const isSatis = !isHurda&&!isTamir;
  const ayarlar = kategori==="gumus_satis"?AYARLAR_GUMUS:AYARLAR_ALTIN;
  const secilenAyar = ayarlar.find(a=>a.label===satir.ayar);
  const turLabel = kategori==="gumus_satis"?"gümüş":"altın";

  const hesaplaTutar = (s) => {
    if (isTamir) return parseFloat(s.sabitIscilik)||0;
    if (s.mod==="adetli") return (parseFloat(s.adet)||0)*(parseFloat(s.adetFiyat)||0);
    const mal = (parseFloat(s.gram)||0)*(parseFloat(s.birimFiyat)||0);
    if (s.iscilikMod==="gramBazli") return mal+(parseFloat(s.gram)||0)*(parseFloat(s.iscilikFiyat)||0);
    return mal+(parseFloat(s.sabitIscilik)||0);
  };

  const guncelle = (alan,deger) => { const yeni={...satir,[alan]:deger}; yeni.tutar=hesaplaTutar(yeni); onChange(yeni); };

  return (
    <div style={{ ...S.card, borderColor:"#2d4a6e" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <span style={{ color:"#60a5fa", fontSize:12, fontWeight:700 }}>KALEM {index+1}</span>
        <button onClick={onSil} style={{ background:"none", border:"none", color:"#ef4444", fontSize:20, cursor:"pointer", padding:0 }}>✕</button>
      </div>
      <span style={S.label}>AÇIKLAMA</span>
      <input value={satir.aciklama} onChange={e=>guncelle("aciklama",e.target.value)} placeholder="Örn: 22 Ayar Bilezik" style={{ ...S.input, marginBottom:10 }} />

      {isSatis && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:12 }}>
          {[["gramli","⚖️ Gramlı"],["adetli","📦 Adetli"]].map(([val,lbl]) => (
            <button key={val} onClick={() => guncelle("mod",val)} style={{ background:satir.mod===val?"#1e3a5244":"#1e2d3d", border:`1px solid ${satir.mod===val?"#3b82f6":"#2d4a6e"}`, borderRadius:6, padding:"8px 0", cursor:"pointer", color:satir.mod===val?"#60a5fa":"#475569", fontFamily:"Georgia,serif", fontSize:13, fontWeight:satir.mod===val?700:400 }}>{lbl}</button>
          ))}
        </div>
      )}

      {satir.mod==="adetli" && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          <div><span style={S.label}>ADET</span><input value={satir.adet} onChange={e=>guncelle("adet",e.target.value)} type="number" inputMode="decimal" placeholder="1" style={S.input} /></div>
          <div><span style={S.label}>BİRİM FİYAT ($)</span><input value={satir.adetFiyat} onChange={e=>guncelle("adetFiyat",e.target.value)} type="number" inputMode="decimal" placeholder="0.00" style={S.input} /></div>
        </div>
      )}

      {(satir.mod==="gramli"||isHurda) && (
        <>
          {!isTamir && (
            <>
              <span style={S.label}>AYAR (OPSİYONEL)</span>
              <select value={satir.ayar} onChange={e=>guncelle("ayar",e.target.value)} style={{ ...S.input, marginBottom:6, color:satir.ayar?"#e2e8f0":"#64748b" }}>
                <option value="">— Ayar seçin (opsiyonel) —</option>
                {ayarlar.map(a=><option key={a.label} value={a.label}>{a.label}</option>)}
              </select>
              {satir.ayar && <HasBilgi gram={satir.gram} ayarOran={secilenAyar?.oran} tur={turLabel} />}
              <div style={{ marginBottom:10 }} />
            </>
          )}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div><span style={S.label}>GRAM</span><input value={satir.gram} onChange={e=>guncelle("gram",e.target.value)} type="number" inputMode="decimal" placeholder="0.000" style={S.input} /></div>
            <div><span style={S.label}>{isHurda?"ALIŞ FİYATI ($/gr)":"BİRİM FİYAT ($/gr)"}</span><input value={satir.birimFiyat} onChange={e=>guncelle("birimFiyat",e.target.value)} type="number" inputMode="decimal" placeholder="0.00" style={S.input} /></div>
          </div>
          {isSatis && (
            <>
              <span style={S.label}>İŞÇİLİK MODU</span>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:10 }}>
                {[["gramBazli","⚖️ Gram × Fiyat"],["sabit","💵 Sabit Tutar"]].map(([val,lbl]) => (
                  <button key={val} onClick={() => guncelle("iscilikMod",val)} style={{ background:satir.iscilikMod===val?"#0a2a1a":"#1e2d3d", border:`1px solid ${satir.iscilikMod===val?"#10b981":"#2d4a6e"}`, borderRadius:6, padding:"7px 0", cursor:"pointer", color:satir.iscilikMod===val?"#10b981":"#475569", fontFamily:"Georgia,serif", fontSize:12, fontWeight:satir.iscilikMod===val?700:400 }}>{lbl}</button>
                ))}
              </div>
              {satir.iscilikMod==="gramBazli" && (
                <>
                  <span style={S.label}>İŞÇİLİK ($/gr)</span>
                  <input value={satir.iscilikFiyat} onChange={e=>guncelle("iscilikFiyat",e.target.value)} type="number" inputMode="decimal" placeholder="0.00" style={{ ...S.input, marginBottom:6 }} />
                  {satir.gram&&satir.iscilikFiyat && <div style={{ fontSize:11, color:"#10b981", marginBottom:8 }}>{satir.gram}gr × ${satir.iscilikFiyat} = <b>{fmt$((parseFloat(satir.gram)||0)*(parseFloat(satir.iscilikFiyat)||0))} işçilik</b></div>}
                </>
              )}
              {satir.iscilikMod==="sabit" && (
                <>
                  <span style={S.label}>SABİT İŞÇİLİK ($)</span>
                  <input value={satir.sabitIscilik} onChange={e=>guncelle("sabitIscilik",e.target.value)} type="number" inputMode="decimal" placeholder="0.00" style={{ ...S.input, marginBottom:8 }} />
                </>
              )}
            </>
          )}
        </>
      )}

      {isTamir && (
        <>
          <span style={S.label}>TUTAR ($)</span>
          <input value={satir.sabitIscilik} onChange={e=>guncelle("sabitIscilik",e.target.value)} type="number" inputMode="decimal" placeholder="0.00" style={{ ...S.input, marginBottom:10 }} />
        </>
      )}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:10, borderTop:"1px solid #1e3a52", marginTop:4 }}>
        <span style={{ color:"#475569", fontSize:11 }}>
          {satir.mod==="adetli"&&satir.adet&&satir.adetFiyat?`${satir.adet} × ${fmt$(satir.adetFiyat)}`:""}
          {(satir.mod==="gramli"||isHurda)&&satir.gram&&satir.birimFiyat?`${satir.gram}gr × ${fmt$(satir.birimFiyat)}`:""}
        </span>
        <span style={{ color:"#f0a500", fontWeight:700, fontSize:18 }}>{fmt$(satir.tutar)}</span>
      </div>
    </div>
  );
}

function FisGoruntule({ fis, onKapat }) {
  const katLabel = KATEGORILER.find(k=>k.id===fis.kategori)?.label||"";
  const yazdir = () => {
    const w = window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Fiş ${fis.no}</title>
    <style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Courier New',monospace;font-size:13px;width:280px;padding:12px;}.c{text-align:center;}.b{font-weight:bold;}.hr{border:none;border-top:1px dashed #999;margin:8px 0;}.row{display:flex;justify-content:space-between;}.sm{font-size:11px;color:#666;}@media print{.np{display:none;}}</style>
    </head><body>
    <div class="c b" style="font-size:14px;margin-bottom:2px">${fis.dukkan.ad}</div>
    <div class="c sm">${fis.dukkan.adres}</div><div class="c sm">Tel: ${fis.dukkan.telefon}</div>
    <hr class="hr"><div class="row"><span>Fiş No: <b>${fis.no}</b></span><span class="sm">${fis.tarih}</span></div>
    <div class="sm">İşlem: ${katLabel}</div>${fis.cari?`<div class="sm">Müşteri: <b>${fis.cari.ad}</b></div>`:""}
    <hr class="hr">
    ${fis.satirlar.map(s=>{
      const detay=s.mod==="adetli"?`${s.adet} adet × ${fmt$(s.adetFiyat)}`:[s.gram?s.gram+"gr":"",s.ayar||"",s.birimFiyat?fmt$(s.birimFiyat)+"/gr":""].filter(Boolean).join(" | ");
      const isc=s.iscilikMod==="gramBazli"&&s.iscilikFiyat?` | İşç:${s.gram}gr×${fmt$(s.iscilikFiyat)}`:s.iscilikMod==="sabit"&&s.sabitIscilik?` | İşç:${fmt$(s.sabitIscilik)}`:"";
      return `<div class="b" style="margin-top:6px">${s.aciklama||"Ürün"}</div><div class="row sm"><span>${detay}${isc}</span><b>${fmt$(s.tutar)}</b></div>`;
    }).join("")}
    <hr class="hr"><div class="row b" style="font-size:15px"><span>TOPLAM</span><span>${fmt$(fis.toplam)}</span></div>
    <hr class="hr"><div class="c sm" style="margin-top:8px">Teşekkür ederiz 🙏</div>
    <div class="np" style="margin-top:16px"><button onclick="window.print()" style="width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer">🖨️ Yazdır / PDF Kaydet</button></div>
    </body></html>`);
    w.document.close(); setTimeout(()=>w.print(),400);
  };
  return (
    <div style={{ flex:1, overflowY:"auto", padding:14 }}>
      <div style={{ background:"#fff", color:"#111", borderRadius:8, padding:18, fontFamily:"'Courier New',monospace", fontSize:13, maxWidth:300, margin:"0 auto", boxShadow:"0 0 30px #3b82f644" }}>
        <div style={{ textAlign:"center", marginBottom:8 }}>
          <div style={{ fontWeight:700, fontSize:14 }}>{fis.dukkan.ad}</div>
          <div style={{ fontSize:11, color:"#666" }}>{fis.dukkan.adres}</div>
          <div style={{ fontSize:11, color:"#666" }}>Tel: {fis.dukkan.telefon}</div>
        </div>
        <div style={{ borderTop:"1px dashed #aaa", margin:"8px 0" }} />
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:12 }}>
          <span>Fiş No: <strong>{fis.no}</strong></span>
          <span style={{ fontSize:11, color:"#888" }}>{fis.tarih}</span>
        </div>
        <div style={{ fontSize:11, color:"#666" }}>İşlem: {katLabel}</div>
        {fis.cari&&<div style={{ fontSize:12 }}>Müşteri: <strong>{fis.cari.ad}</strong></div>}
        <div style={{ borderTop:"1px dashed #aaa", margin:"8px 0" }} />
        {fis.satirlar.map((s,i)=>(
          <div key={i} style={{ marginBottom:8 }}>
            <div style={{ fontWeight:700 }}>{s.aciklama||"Ürün"}</div>
            {s.mod==="adetli"?(
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#555" }}><span>{s.adet} adet × {fmt$(s.adetFiyat)}</span><strong>{fmt$(s.tutar)}</strong></div>
            ):(
              <>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#555" }}>
                  <span>{[s.gram?s.gram+"gr":"",s.ayar||"",s.birimFiyat?fmt$(s.birimFiyat)+"/gr":""].filter(Boolean).join(" | ")}</span>
                  <strong>{fmt$(s.tutar)}</strong>
                </div>
                {s.iscilikMod==="gramBazli"&&s.iscilikFiyat&&<div style={{ fontSize:11, color:"#888" }}>İşçilik: {s.gram}gr × {fmt$(s.iscilikFiyat)}</div>}
                {s.iscilikMod==="sabit"&&s.sabitIscilik&&<div style={{ fontSize:11, color:"#888" }}>İşçilik: {fmt$(s.sabitIscilik)}</div>}
              </>
            )}
          </div>
        ))}
        <div style={{ borderTop:"1px dashed #aaa", paddingTop:8, marginTop:4, display:"flex", justifyContent:"space-between", fontWeight:700, fontSize:15 }}>
          <span>TOPLAM</span><span>{fmt$(fis.toplam)}</span>
        </div>
        <div style={{ textAlign:"center", marginTop:10, fontSize:11, color:"#888" }}>— Teşekkür ederiz 🙏 —</div>
      </div>
      <div style={{ maxWidth:300, margin:"14px auto 0", display:"flex", flexDirection:"column", gap:10 }}>
        <button onClick={yazdir} style={S.btn("linear-gradient(135deg,#3b82f6,#2563eb)")} className="noprint">🖨️ Yazdır / PDF Kaydet</button>
        <button onClick={onKapat} style={{ ...S.btn("#16222e","#60a5fa"), border:"1px solid #1e3a52" }} className="noprint">← Yeni Fiş</button>
      </div>
    </div>
  );
}

function FisEkrani({ cariler, dukkan, onFisKesild }) {
  const [kategori, setKategori] = useState("altin_satis");
  const [satirlar, setSatirlar] = useState([]);
  const [cariId, setCariId] = useState("");
  const [fisGoster, setFisGoster] = useState(null);

  const bosSatir = () => ({ id:Date.now()+Math.random(), aciklama:"", mod:"gramli", iscilikMod:"sabit", gram:"", birimFiyat:"", ayar:"", iscilikFiyat:"", sabitIscilik:"", adet:"", adetFiyat:"", tutar:0 });
  const satirEkle = () => setSatirlar(p=>[...p,bosSatir()]);
  const satirGuncelle = (id,yeni) => setSatirlar(p=>p.map(s=>s.id===id?{...yeni,id}:s));
  const satirSil = (id) => setSatirlar(p=>p.filter(s=>s.id!==id));
  const kategoriDegistir = (k) => { setKategori(k); setSatirlar([]); };
  const toplam = satirlar.reduce((a,s)=>a+(s.tutar||0),0);

  const fisCik = () => {
    if (!satirlar.length) return;
    const fis = { no:yeniFisNo(), tarih:tarihStr(), kategori, satirlar, toplam, cari:cariler.find(c=>c.id===cariId)||null, dukkan };
    onFisKesild(fis);
    setFisGoster(fis);
  };

  if (fisGoster) return <FisGoruntule fis={fisGoster} onKapat={() => { setFisGoster(null); setSatirlar([]); setCariId(""); }} />;

  const kat = KATEGORILER.find(k=>k.id===kategori);
  return (
    <div style={{ flex:1, overflowY:"auto", padding:14 }}>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
        {KATEGORILER.map(k=>(
          <button key={k.id} onClick={() => kategoriDegistir(k.id)} style={{ background:kategori===k.id?k.renk+"22":"#16222e", border:`1px solid ${kategori===k.id?k.renk:"#1e3a52"}`, borderRadius:10, padding:"11px 8px", cursor:"pointer", color:kategori===k.id?k.renk:"#475569", fontFamily:"Georgia,serif", fontSize:13, fontWeight:kategori===k.id?700:400, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
            {k.ikon} {k.label}
          </button>
        ))}
      </div>
      <div style={S.card}>
        <span style={S.label}>MÜŞTERİ (OPSİYONEL)</span>
        <select value={cariId} onChange={e=>setCariId(e.target.value)} style={{ ...S.input, color:cariId?"#e2e8f0":"#64748b" }}>
          <option value="">— Misafir Müşteri —</option>
          {cariler.map(c=><option key={c.id} value={c.id}>{c.ad}</option>)}
        </select>
      </div>
      {satirlar.map((s,i)=><SatirGiris key={s.id} satir={s} index={i} kategori={kategori} onChange={yeni=>satirGuncelle(s.id,yeni)} onSil={()=>satirSil(s.id)} />)}
      <button onClick={satirEkle} style={{ ...S.btn("#16222e",kat.renk), border:`1px dashed ${kat.renk}55`, marginBottom:14 }}>+ {kat.ikon} Satır Ekle</button>
      {satirlar.length>0 && (
        <div style={{ ...S.card, borderColor:"#f0a50044", marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div><div style={{ color:"#64748b", fontSize:12 }}>TOPLAM</div><div style={{ color:"#475569", fontSize:11 }}>{satirlar.length} kalem</div></div>
            <span style={{ color:"#f0a500", fontSize:28, fontWeight:700 }}>{fmt$(toplam)}</span>
          </div>
        </div>
      )}
      <button onClick={fisCik} disabled={!satirlar.length} style={{ ...S.btn(satirlar.length?"linear-gradient(135deg,#f0a500,#d97706)":"#16222e",satirlar.length?"#1a0800":"#475569"), fontSize:16 }}>🧾 Fiş Kes</button>
    </div>
  );
}

// ─── GEÇMİŞ EKRANI ───────────────────────────────────────────────────────────
function GecmisEkrani({ fisler, setFisler }) {
  const [filtre, setFiltre] = useState("hepsi");
  const [secilenFis, setSecilenFis] = useState(null);

  const filtrelenmis = filtre==="hepsi" ? fisler : fisler.filter(f=>f.kategori===filtre);
  const toplamTutar = filtrelenmis.reduce((a,f)=>a+f.toplam,0);

  const fisSil = (no) => {
    if (!window.confirm("Bu fişi silmek istediğinize emin misiniz?")) return;
    setFisler(p=>p.filter(f=>f.no!==no));
    setSecilenFis(null);
  };

  if (secilenFis) return (
    <div style={{ flex:1, overflowY:"auto" }}>
      <div style={{ padding:"10px 14px" }}>
        <button onClick={() => setSecilenFis(null)} style={{ background:"none", border:"none", color:"#3b82f6", cursor:"pointer", fontFamily:"Georgia,serif", fontSize:14 }}>← Geri</button>
      </div>
      <FisGoruntule fis={secilenFis} onKapat={() => setSecilenFis(null)} />
      <div style={{ padding:"0 14px 14px", maxWidth:300, margin:"0 auto" }}>
        <button onClick={() => fisSil(secilenFis.no)} style={{ ...S.btn("#2a0a0a","#ef4444"), border:"1px solid #ef444433", marginTop:8 }}>🗑️ Fişi Sil</button>
      </div>
    </div>
  );

  return (
    <div style={{ flex:1, overflowY:"auto", padding:14 }}>
      {/* Filtre */}
      <div style={{ display:"flex", gap:6, marginBottom:12, overflowX:"auto", paddingBottom:4 }}>
        {[["hepsi","Hepsi"],...KATEGORILER.map(k=>[k.id,k.ikon+" "+k.label])].map(([val,lbl]) => (
          <button key={val} onClick={() => setFiltre(val)} style={{ background:filtre===val?"#1e3a52":"#16222e", border:`1px solid ${filtre===val?"#3b82f6":"#1e3a52"}`, borderRadius:20, padding:"6px 12px", cursor:"pointer", color:filtre===val?"#60a5fa":"#475569", fontFamily:"Georgia,serif", fontSize:12, whiteSpace:"nowrap", fontWeight:filtre===val?700:400 }}>{lbl}</button>
        ))}
      </div>

      {/* Özet */}
      <div style={{ ...S.card, borderColor:"#f0a50033", marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ color:"#64748b", fontSize:11, letterSpacing:1 }}>TOPLAM ({filtrelenmis.length} fiş)</div>
            <div style={{ color:"#475569", fontSize:11 }}>{filtre==="hepsi"?"Tüm işlemler":KATEGORILER.find(k=>k.id===filtre)?.label}</div>
          </div>
          <span style={{ color:"#f0a500", fontSize:22, fontWeight:700 }}>{fmt$(toplamTutar)}</span>
        </div>
      </div>

      {filtrelenmis.length===0 && (
        <div style={{ textAlign:"center", color:"#334155", padding:40 }}>Henüz fiş yok</div>
      )}

      {[...filtrelenmis].reverse().map(f => {
        const kat = KATEGORILER.find(k=>k.id===f.kategori);
        return (
          <button key={f.no} onClick={() => setSecilenFis(f)} style={{ ...S.card, width:"100%", textAlign:"left", cursor:"pointer", border:"1px solid #1e3a52", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                <span style={{ fontSize:14 }}>{kat?.ikon}</span>
                <span style={{ color:"#93c5fd", fontWeight:600, fontSize:14 }}>{f.no}</span>
                {f.cari && <span style={{ color:"#475569", fontSize:12 }}>• {f.cari.ad}</span>}
              </div>
              <div style={{ color:"#475569", fontSize:11 }}>{f.tarih}</div>
              <div style={{ color:kat?.renk, fontSize:11, marginTop:2 }}>{kat?.label} • {f.satirlar.length} kalem</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ color:"#f0a500", fontWeight:700, fontSize:16 }}>{fmt$(f.toplam)}</div>
              <div style={{ color:"#475569", fontSize:10, marginTop:2 }}>→</div>
            </div>
          </button>
        );
      })}
    </div>
  );
}

function HurdaEkrani({ cariler, dukkan, onFisKesild }) {
  const [tur, setTur] = useState("altin");
  const [gram, setGram] = useState("");
  const [ayar, setAyar] = useState("");
  const [birimFiyat, setBirimFiyat] = useState("");
  const [aciklama, setAciklama] = useState("");
  const [cariId, setCariId] = useState("");
  const [fisGoster, setFisGoster] = useState(null);

  const ayarlar = tur==="altin"?AYARLAR_ALTIN:AYARLAR_GUMUS;
  const secilenAyar = ayarlar.find(a=>a.label===ayar);
  const tutar = (parseFloat(gram)||0)*(parseFloat(birimFiyat)||0);
  const turLabel = tur==="altin"?"altın":"gümüş";

  const fisCik = () => {
    if (!gram||!birimFiyat) return;
    const fis = { no:yeniFisNo(), tarih:tarihStr(), kategori:"hurda_alim", satirlar:[{ aciklama:aciklama||(ayar?ayar+" ":"")+"Hurda "+turLabel, gram, birimFiyat, ayar, tutar, mod:"gramli" }], toplam:tutar, cari:cariler.find(c=>c.id===cariId)||null, dukkan };
    onFisKesild(fis);
    setFisGoster(fis);
  };

  if (fisGoster) return <FisGoruntule fis={fisGoster} onKapat={() => { setFisGoster(null); setGram(""); setBirimFiyat(""); setAciklama(""); setAyar(""); }} />;

  return (
    <div style={{ flex:1, overflowY:"auto", padding:14 }}>
      <div style={{ ...S.card, borderColor:"#10b98144" }}>
        <div style={{ color:"#10b981", fontWeight:700, fontSize:15, marginBottom:14 }}>♻️ HURDA ALIM</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
          {[["altin","🥇 Altın"],["gumus","⚪ Gümüş"]].map(([val,lbl]) => (
            <button key={val} onClick={() => { setTur(val); setAyar(""); }} style={{ background:tur===val?"#10b98122":"#1e2d3d", border:`1px solid ${tur===val?"#10b981":"#2d4a6e"}`, borderRadius:8, padding:"11px 0", cursor:"pointer", color:tur===val?"#10b981":"#475569", fontFamily:"Georgia,serif", fontSize:14, fontWeight:tur===val?700:400 }}>{lbl}</button>
          ))}
        </div>
        <span style={S.label}>MÜŞTERİ (OPSİYONEL)</span>
        <select value={cariId} onChange={e=>setCariId(e.target.value)} style={{ ...S.input, marginBottom:12, color:cariId?"#e2e8f0":"#64748b" }}>
          <option value="">— Misafir —</option>
          {cariler.map(c=><option key={c.id} value={c.id}>{c.ad}</option>)}
        </select>
        <span style={S.label}>AÇIKLAMA (OPSİYONEL)</span>
        <input value={aciklama} onChange={e=>setAciklama(e.target.value)} placeholder="Örn: Altın yüzük..." style={{ ...S.input, marginBottom:12 }} />
        <span style={S.label}>AYAR (OPSİYONEL)</span>
        <select value={ayar} onChange={e=>setAyar(e.target.value)} style={{ ...S.input, marginBottom:6, color:ayar?"#e2e8f0":"#64748b" }}>
          <option value="">— Ayar seçin —</option>
          {ayarlar.map(a=><option key={a.label} value={a.label}>{a.label}</option>)}
        </select>
        {ayar&&gram&&<HasBilgi gram={gram} ayarOran={secilenAyar?.oran} tur={turLabel} />}
        <div style={{ marginBottom:12 }} />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
          <div><span style={S.label}>GRAM</span><input value={gram} onChange={e=>setGram(e.target.value)} type="number" inputMode="decimal" placeholder="0.000" style={S.input} /></div>
          <div><span style={S.label}>ALIŞ FİYATI ($/gr)</span><input value={birimFiyat} onChange={e=>setBirimFiyat(e.target.value)} type="number" inputMode="decimal" placeholder="0.00" style={S.input} /></div>
        </div>
        {gram&&birimFiyat && (
          <div style={{ padding:"12px 14px", background:"#0a1a12", borderRadius:8, border:"1px solid #10b98155", marginBottom:14 }}>
            <div style={{ color:"#475569", fontSize:12 }}>{gram}gr × {fmt$(birimFiyat)}/gr</div>
            <div style={{ color:"#10b981", fontSize:24, fontWeight:700, marginTop:2 }}>{fmt$(tutar)}</div>
            <div style={{ color:"#475569", fontSize:11 }}>müşteriye ödenecek</div>
          </div>
        )}
        <button onClick={fisCik} disabled={!gram||!birimFiyat} style={S.btn(gram&&birimFiyat?"linear-gradient(135deg,#10b981,#059669)":"#16222e","#fff")}>🧾 Hurda Fişi Kes</button>
      </div>
    </div>
  );
}

function CariEkrani({ cariler, setCariler }) {
  const [ekran, setEkran] = useState("liste");
  const [secilenId, setSecilenId] = useState(null);
  const [yeniAd, setYeniAd] = useState(""); const [yeniTel, setYeniTel] = useState("");
  const [islemTip, setIslemTip] = useState("odeme");
  const [islemTutar, setIslemTutar] = useState(""); const [islemAcik, setIslemAcik] = useState("");
  const secilen = cariler.find(c=>c.id===secilenId);

  const cariEkle = () => { if(!yeniAd.trim()) return; setCariler(p=>[...p,{id:Date.now(),ad:yeniAd.trim(),telefon:yeniTel.trim(),bakiye:0,islemler:[]}]); setYeniAd(""); setYeniTel(""); setEkran("liste"); };
  const islemYap = () => {
    const tutar=parseFloat(islemTutar); if(!tutar||!secilen) return;
    const delta=islemTip==="odeme"?tutar:-tutar;
    const islem={id:Date.now(),tip:islemTip,tutar,aciklama:islemAcik||(islemTip==="odeme"?"Ödeme alındı":"Borç eklendi"),tarih:tarihStr()};
    setCariler(p=>p.map(c=>c.id===secilenId?{...c,bakiye:c.bakiye+delta,islemler:[islem,...(c.islemler||[])]}:c));
    setIslemTutar(""); setIslemAcik("");
  };
  const cariSil = (id) => { if(!window.confirm("Bu müşteriyi silmek istediğinize emin misiniz?")) return; setCariler(p=>p.filter(c=>c.id!==id)); setEkran("liste"); };

  if (ekran==="yeni") return (
    <div style={{ flex:1, overflowY:"auto", padding:14 }}>
      <button onClick={() => setEkran("liste")} style={{ background:"none", border:"none", color:"#3b82f6", cursor:"pointer", fontFamily:"Georgia,serif", fontSize:14, marginBottom:14 }}>← Geri</button>
      <div style={S.card}>
        <div style={{ color:"#60a5fa", fontWeight:700, marginBottom:12 }}>Yeni Müşteri</div>
        <span style={S.label}>AD SOYAD</span>
        <input value={yeniAd} onChange={e=>setYeniAd(e.target.value)} placeholder="Müşteri adı..." style={{ ...S.input, marginBottom:10 }} />
        <span style={S.label}>TELEFON</span>
        <input value={yeniTel} onChange={e=>setYeniTel(e.target.value)} placeholder="0XXX XXX XX XX" type="tel" style={{ ...S.input, marginBottom:14 }} />
        <button onClick={cariEkle} style={S.btn()}>Kaydet</button>
      </div>
    </div>
  );

  if (ekran==="detay"&&secilen) return (
    <div style={{ flex:1, overflowY:"auto", padding:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <button onClick={() => setEkran("liste")} style={{ background:"none", border:"none", color:"#3b82f6", cursor:"pointer", fontFamily:"Georgia,serif", fontSize:14 }}>← Geri</button>
        <button onClick={() => cariSil(secilen.id)} style={{ background:"none", border:"none", color:"#ef4444", cursor:"pointer", fontFamily:"Georgia,serif", fontSize:13 }}>Sil</button>
      </div>
      <div style={S.card}>
        <div style={{ color:"#60a5fa", fontWeight:700, fontSize:16 }}>{secilen.ad}</div>
        {secilen.telefon&&<div style={{ color:"#475569", fontSize:13, marginTop:2 }}>{secilen.telefon}</div>}
        <div style={{ marginTop:12, padding:"12px 14px", background:"#0f1923", borderRadius:8 }}>
          <div style={{ color:"#475569", fontSize:11, letterSpacing:1 }}>BAKİYE</div>
          <div style={{ color:secilen.bakiye<0?"#ef4444":secilen.bakiye>0?"#10b981":"#475569", fontSize:26, fontWeight:700, marginTop:2 }}>{fmt$(secilen.bakiye)}</div>
          <div style={{ color:"#475569", fontSize:11 }}>{secilen.bakiye<0?"BORÇLU":secilen.bakiye>0?"ALACAKLI":"SIFIR"}</div>
        </div>
      </div>
      <div style={S.card}>
        <div style={{ color:"#64748b", fontSize:12, marginBottom:10, letterSpacing:1 }}>İŞLEM YAP</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
          {[["odeme","✅ Ödeme Al","#0a2a1a","#10b981"],["borc","➕ Borç Ekle","#2a0a0a","#ef4444"]].map(([val,lbl,bg,brd]) => (
            <button key={val} onClick={() => setIslemTip(val)} style={{ background:islemTip===val?bg:"#1e2d3d", border:`1px solid ${islemTip===val?brd:"#2d4a6e"}`, borderRadius:8, padding:"10px 0", cursor:"pointer", color:islemTip===val?"#fff":"#475569", fontFamily:"Georgia,serif", fontSize:13 }}>{lbl}</button>
          ))}
        </div>
        <span style={S.label}>TUTAR ($)</span>
        <input value={islemTutar} onChange={e=>setIslemTutar(e.target.value)} type="number" inputMode="decimal" placeholder="0.00" style={{ ...S.input, marginBottom:10 }} />
        <span style={S.label}>AÇIKLAMA</span>
        <input value={islemAcik} onChange={e=>setIslemAcik(e.target.value)} placeholder="Opsiyonel..." style={{ ...S.input, marginBottom:12 }} />
        <button onClick={islemYap} style={S.btn()}>Kaydet</button>
      </div>
      {(secilen.islemler||[]).length>0 && (
        <div style={S.card}>
          <div style={{ color:"#64748b", fontSize:12, marginBottom:10, letterSpacing:1 }}>İŞLEM GEÇMİŞİ</div>
          {(secilen.islemler||[]).map(is=>(
            <div key={is.id} style={{ padding:"8px 0", borderBottom:"1px solid #16222e", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div><div style={{ color:"#cbd5e1", fontSize:13 }}>{is.aciklama}</div><div style={{ color:"#475569", fontSize:11 }}>{is.tarih}</div></div>
              <div style={{ color:is.tip==="odeme"?"#10b981":"#ef4444", fontWeight:700, fontSize:14 }}>{is.tip==="odeme"?"+":"-"}{fmt$(is.tutar)}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );

  return (
    <div style={{ flex:1, overflowY:"auto", padding:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <span style={{ color:"#60a5fa", fontWeight:700 }}>Müşteriler ({cariler.length})</span>
        <button onClick={() => setEkran("yeni")} style={{ background:"linear-gradient(135deg,#3b82f6,#2563eb)", border:"none", borderRadius:6, padding:"8px 16px", color:"#fff", fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif", fontSize:13 }}>+ Ekle</button>
      </div>
      {!cariler.length&&<div style={{ textAlign:"center", color:"#334155", padding:40 }}>Henüz müşteri yok</div>}
      {cariler.map(c=>(
        <button key={c.id} onClick={() => { setSecilenId(c.id); setEkran("detay"); }} style={{ ...S.card, width:"100%", textAlign:"left", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", border:"1px solid #1e3a52" }}>
          <div><div style={{ color:"#93c5fd", fontWeight:600, fontSize:15 }}>{c.ad}</div>{c.telefon&&<div style={{ color:"#475569", fontSize:12, marginTop:2 }}>{c.telefon}</div>}</div>
          <div style={{ textAlign:"right" }}>
            <div style={{ color:c.bakiye<0?"#ef4444":c.bakiye>0?"#10b981":"#475569", fontWeight:700, fontSize:15 }}>{fmt$(c.bakiye)}</div>
            <div style={{ fontSize:10, color:c.bakiye<0?"#ef4444":c.bakiye>0?"#10b981":"#475569" }}>{c.bakiye<0?"BORÇLU":c.bakiye>0?"ALACAKLI":"SIFIR"}</div>
          </div>
        </button>
      ))}
    </div>
  );
}

function AyarlarEkrani({ dukkan, setDukkan }) {
  const [form, setForm] = useState(dukkan);
  const [kaydedildi, setKaydedildi] = useState(false);
  const kaydet = () => { setDukkan(form); setKaydedildi(true); setTimeout(()=>setKaydedildi(false),2000); };
  return (
    <div style={{ flex:1, overflowY:"auto", padding:14 }}>
      <div style={S.card}>
        <div style={{ color:"#60a5fa", fontWeight:700, marginBottom:14, fontSize:15 }}>🏪 Dükkan Bilgileri</div>
        <span style={S.label}>DÜKKAN ADI</span>
        <input value={form.ad} onChange={e=>setForm(p=>({...p,ad:e.target.value}))} style={{ ...S.input, marginBottom:10 }} />
        <span style={S.label}>ADRES</span>
        <input value={form.adres} onChange={e=>setForm(p=>({...p,adres:e.target.value}))} style={{ ...S.input, marginBottom:10 }} />
        <span style={S.label}>TELEFON</span>
        <input value={form.telefon} onChange={e=>setForm(p=>({...p,telefon:e.target.value}))} type="tel" style={{ ...S.input, marginBottom:14 }} />
        <button onClick={kaydet} style={S.btn(kaydedildi?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#3b82f6,#2563eb)")}>{kaydedildi?"✅ Kaydedildi!":"💾 Kaydet"}</button>
      </div>
      <div style={{ ...S.card, borderColor:"#1e3a52" }}>
        <div style={{ color:"#64748b", fontSize:13, lineHeight:1.7 }}>
          <b style={{ color:"#60a5fa" }}>ℹ️ Bilgi</b><br/>
          Tüm fiyatlar $ (Dolar) olarak hesaplanır.<br/>
          Cariler, fişler ve dükkan bilgileri cihazınızda saklanır.<br/>
          Fişleri PDF olarak kaydedebilir veya yazdırabilirsiniz.
        </div>
      </div>
    </div>
  );
}

function App() {
  const [sekme, setSekme] = useState("fis");
  const [cariler, setCariler] = useState(LS.get("cariler",[]));
  const [dukkan, setDukkan] = useState(LS.get("dukkan",DUKKAN_DEFAULT));
  const [fisler, setFisler] = useState(LS.get("fisler",[]));

  useEffect(() => { LS.set("cariler",cariler); }, [cariler]);
  useEffect(() => { LS.set("dukkan",dukkan); }, [dukkan]);
  useEffect(() => { LS.set("fisler",fisler); }, [fisler]);

  const fisCekildi = (fis) => setFisler(p=>[...p,fis]);

  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:"#0f1923", color:"#e2e8f0", maxWidth:480, margin:"0 auto" }}>
      <div style={{ background:"linear-gradient(90deg,#0a1520,#0f2035,#0a1520)", borderBottom:"2px solid #1e3a52", padding:"12px 16px", flexShrink:0, display:"flex", alignItems:"center", gap:12 }}>
        <span style={{ fontSize:26 }}>💍</span>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, fontWeight:700, color:"#60a5fa", letterSpacing:1 }}>{dukkan.ad}</div>
          <div style={{ fontSize:10, color:"#334155", letterSpacing:1 }}>KUYUMCU YÖNETİM SİSTEMİ</div>
        </div>
        <div style={{ fontSize:13, color:"#f0a500", fontWeight:700 }}>$ USD</div>
      </div>
      <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
        {sekme==="fis" && <FisEkrani cariler={cariler} dukkan={dukkan} onFisKesild={fisCekildi} />}
        {sekme==="gecmis" && <GecmisEkrani fisler={fisler} setFisler={setFisler} />}
        {sekme==="hurda" && <HurdaEkrani cariler={cariler} dukkan={dukkan} onFisKesild={fisCekildi} />}
        {sekme==="cari" && <CariEkrani cariler={cariler} setCariler={setCariler} />}
        {sekme==="ayarlar" && <AyarlarEkrani dukkan={dukkan} setDukkan={setDukkan} />}
      </div>
      <BottomNav aktif={sekme} setAktif={setSekme} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
